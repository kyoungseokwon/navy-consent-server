<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관리자</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans KR",sans-serif;background:#f4f7fb;color:#172033}.top{background:#10245b;color:#fff;padding:18px}.wrap{max-width:1120px;margin:auto;padding:16px}.top .wrap{padding:0;display:flex;justify-content:space-between;align-items:center}.top a{color:#fff}.card{background:#fff;border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 4px 18px #1a2b5010}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grow{flex:1;min-width:170px}input,select,button{font-size:15px;padding:11px;border:1px solid #ccd4e1;border-radius:9px}button{font-weight:bold;background:#2463eb;color:#fff;border:0;cursor:pointer}.gray{background:#e9edf5;color:#172033}.green{background:#168a45}.danger{background:#d93025}.warn{background:#dc7b13}.status{font-weight:bold;padding:10px 12px;border-radius:9px;background:#eef3ff}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#f7f9fd;padding:12px;border-radius:10px;text-align:center}.stat b{display:block;font-size:22px;color:#10245b}.table{overflow:auto}table{border-collapse:collapse;width:100%;min-width:850px}th,td{padding:10px;border-bottom:1px solid #e7ebf2;text-align:left;font-size:13px}th{background:#f7f9fd}.sig{max-width:110px;max-height:55px}.login{max-width:420px;margin:50px auto}.hide{display:none}@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<header class="top"><div class="wrap"><b>입영 동의서 관리자</b><a href="/">작성 화면</a></div></header>
<div class="wrap">
<section id="loginBox" class="card login"><h2>관리자 로그인</h2><div class="row"><input id="pw" type="text" inputmode="text" lang="ko" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="관리자 비밀번호" style="flex:1;-webkit-text-security:disc"><button onclick="doLogin()">로그인</button></div><p id="loginMsg"></p></section>
<section id="dashBox" class="hide">
<div class="card">
  <div class="row">
    <select id="cohortSelect" class="grow" onchange="selectCohort()"></select>
    <input id="newCohort" class="grow" placeholder="새 기수 ex) 726기">
    <button onclick="createCohort()">기수 생성</button>
    <button class="warn" onclick="closeCohort()">기수 마감</button>
    <button class="green" onclick="openCohort()">마감 해제</button>
    <button class="danger" onclick="deleteCohort()">기수 삭제</button>
  </div>
  <div id="closeStatus" class="status" style="margin-top:10px">상태 확인 중</div>
</div>
<div class="card"><div class="row">
  <input id="q" class="grow" placeholder="이름/소대번호 검색" oninput="load()">
  <button onclick="refreshAll()">새로고침</button>
  <button class="green" onclick="excel()">엑셀 다운로드</button>
  <button class="danger" onclick="logout()">로그아웃</button>
</div></div>
<div class="card stats"><div class="stat"><b id="total">0</b>총 제출</div><div class="stat"><b id="c1">0</b>1중대</div><div class="stat"><b id="c2">0</b>2중대</div><div class="stat"><b id="c3">0</b>3중대</div><div class="stat"><b id="c4">0</b>4중대</div></div>
<div class="card table"><table><thead><tr><th>기수</th><th>이름</th><th>소대번호</th><th>생년월일</th><th>동의</th><th>서명</th><th>제출시간</th><th>삭제</th></tr></thead><tbody id="tb"></tbody></table></div>
</section></div>
<script>
let token=localStorage.getItem("consentAdminToken")||"",closedMap={};
const $=id=>document.getElementById(id);
function headers(){return {"Authorization":"Bearer "+token,"Content-Type":"application/json"}}
function show(){$("loginBox").classList.toggle("hide",!!token);$("dashBox").classList.toggle("hide",!token);if(token)refreshAll()}
async function request(url,opt={}){opt.headers={...(opt.headers||{}),Authorization:"Bearer "+token};let r=await fetch(url,opt);let o=await r.json().catch(()=>({}));if(r.status===401){logout();throw new Error("로그인이 필요합니다.")}if(!r.ok)throw new Error(o.error||"요청 실패");return o}
async function doLogin(){let r=await fetch("/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:$("pw").value})});let o=await r.json();if(!r.ok){$("loginMsg").textContent=o.error||"로그인 실패";return}token=o.token;localStorage.setItem("consentAdminToken",token);show()}
function logout(){localStorage.removeItem("consentAdminToken");token="";show()}
async function refreshAll(){await loadCohorts();await load()}
async function loadCohorts(){let o=await request("/api/admin/cohorts");closedMap=o.closed||{};$("cohortSelect").innerHTML=o.cohorts.map(c=>`<option value="${esc(c)}" ${c===o.activeCohort?"selected":""}>${esc(c)}</option>`).join("");updateStatus()}
function selected(){return $("cohortSelect").value}
function updateStatus(){let c=selected();$("closeStatus").textContent=c+(closedMap[c]?" — 마감 상태":" — 접수 가능 상태")}
async function selectCohort(){let name=selected();await request("/api/admin/cohorts/active",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});updateStatus();await load()}
async function createCohort(){let name=$("newCohort").value.trim();if(!name)return alert("새 기수를 입력하세요.");await request("/api/admin/cohorts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});$("newCohort").value="";await refreshAll();alert(name+"가 현재 기수로 생성되었습니다.")}
async function closeCohort(){let name=selected();if(!confirm(name+"를 마감할까요? 마감 후 훈련병 제출이 차단됩니다."))return;await request("/api/admin/cohorts/close",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});await loadCohorts()}
async function openCohort(){let name=selected();if(!confirm(name+" 마감을 해제할까요?"))return;await request("/api/admin/cohorts/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});await loadCohorts()}
async function deleteCohort(){let name=selected();if(!confirm(name+" 기수와 해당 제출 자료를 모두 삭제할까요?"))return;if(!confirm("이 작업은 복구할 수 없습니다. 정말 삭제할까요?"))return;await request("/api/admin/cohorts",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});await refreshAll()}
async function load(){let cohort=selected();if(!cohort)return;let o=await request("/api/admin/consents?q="+encodeURIComponent($("q").value)+"&cohort="+encodeURIComponent(cohort));$("total").textContent=o.total;$("c1").textContent=o.stats.c1;$("c2").textContent=o.stats.c2;$("c3").textContent=o.stats.c3;$("c4").textContent=o.stats.c4;$("tb").innerHTML=o.rows.map(x=>`<tr><td>${esc(x.cohort)}</td><td>${esc(x.name)}</td><td>${esc(x.platoon)}</td><td>${esc(x.birth_date)}</td><td>${[x.agree1,x.agree2,x.agree3,x.agree4,x.agree5].every(Boolean)?"전체":"일부"}</td><td>${esc(String(x.signature_data||'').startsWith('data:image/')?'기존 손글씨 서명':x.signature_data)}</td><td>${new Date(x.submitted_at).toLocaleString()}</td><td><button class="danger" onclick="del(${x.id})">삭제</button></td></tr>`).join("")}
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]))}
async function del(id){if(!confirm("정말 삭제할까요?"))return;await request("/api/admin/consents/"+id,{method:"DELETE"});await load()}
function excel(){let cohort=selected();location.href="/api/admin/consents.xlsx?token="+encodeURIComponent(token)+"&cohort="+encodeURIComponent(cohort)}
show();
</script></body></html>
